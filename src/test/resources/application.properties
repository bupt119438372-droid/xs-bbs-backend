spring.datasource.url=jdbc:h2:mem:xsbbs;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=root
spring.datasource.password=test
spring.sql.init.mode=never
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.cache.type=simple
spring.h2.console.enabled=false
app.ai.mode=test
app.ai.provider-name=test

sa-token.token-name=xs-bbs-token
sa-token.timeout=604800
sa-token.active-timeout=1800
sa-token.is-concurrent=true
sa-token.is-share=false
sa-token.token-style=random-64
